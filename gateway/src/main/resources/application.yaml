spring:
  application:
    name: gateway
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: dev
  security:
    oauth2:
      client:
        provider:
          auth-server:
            issuer-uri: ${AUTH_SERVER_URL}

        registration:
          messaging-client-oidc:
            provider: auth-server
            client-id: gateway-client
            client-secret: ${GATEWAY_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile

  cloud:
    gateway:

      server:
        webflux:
          routes:
            - id: auth-server
              uri: ${AUTH_SERVER_URL}
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            - id: resource-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/**
              filters:
                - TokenRelay=

            - id: spa-redirect
              uri: ${FRONT_URL}
              predicates:
                - Path=/**
              filters:
                - RedirectTo=302, http://localhost:5173
          default-filters:
            - TokenRelay=

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
  data:
    redis:
      host: localhost
      port: 6380
  session:
    data:
      redis:
        namespace: spring:session
        repository-type: default

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
server:

  reactive:
    session:
      cookie:
        name: GATEWAY_SESSION
logging:
  level:
    org.springframework.security: TRACE

    org.springframework.security.oauth2: TRACE

    org.springframework.web.server.session: DEBUG
    org.springframework.session: DEBUG